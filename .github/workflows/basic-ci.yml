name: Basic CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy" "pybind11>=2.5.0,<2.11.0"

      - name: Compile public C++ and C API headers
        run: |
          g++ -std=c++17 -I. -c rspt_module/ecg_analysis.cpp -o /tmp/ecg_analysis.o
          g++ -std=c++17 -I. -c rspt_module/ecg_analysis_c.cpp -o /tmp/ecg_analysis_c.o
          g++ -std=c++17 -I. -x c++ -fsyntax-only rspt_module/ecg_analysis.h
          gcc -std=c11 -I. -x c -fsyntax-only rspt_module/ecg_analysis_c.h

      - name: Build and install Python extension
        run: python -m pip install .

      - name: Run Python smoke test
        working-directory: /tmp
        run: |
          python - <<'PY'
          import numpy as np
          import rspt_module

          sampling_rate = 500.0
          sample_count = 5000
          x = np.arange(sample_count)
          signal = np.zeros(sample_count, dtype=np.float64)

          expected_peaks = np.arange(500, 4500, 500)
          for peak in expected_peaks:
              lo = max(0, peak - 10)
              hi = min(sample_count, peak + 11)
              signal[lo:hi] += np.exp(-0.5 * ((x[lo:hi] - peak) / 3.0) ** 2) * 2.0

          detected_peaks = rspt_module.detect_peaks(signal, sampling_rate)
          if len(detected_peaks) != len(expected_peaks):
              raise AssertionError(f"Expected {len(expected_peaks)} peaks, got {len(detected_peaks)}: {detected_peaks}")

          max_error = max(abs(int(actual) - int(expected)) for actual, expected in zip(detected_peaks, expected_peaks))
          if max_error > 2:
              raise AssertionError(f"Detected peaks are too far from expected positions: {detected_peaks}")

          print(f"RSPT smoke test passed: {len(detected_peaks)} peaks detected")
          PY
